# Martools — forkable OSS martech baseline.
# Core always: Postgres + Redis. Enable profiles as needed.
#
#   docker compose up -d
#   docker compose --profile analytics up -d
#   docker compose --profile llm up -d
#   docker compose --profile automation up -d
#   docker compose --profile full up -d
#
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: martools
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: martools
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martools -d martools"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "56379:6379"

  umami:
    profiles: ["analytics", "full"]
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://martools:${POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:?set UMAMI_APP_SECRET in .env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3030:3000"

  ollama:
    profiles: ["llm", "full"]
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  litellm:
    profiles: ["llm", "full"]
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    depends_on:
      - ollama
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"

  n8n:
    profiles: ["automation", "full"]
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: martools
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_SECURE_COOKIE: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  n8n_data:
