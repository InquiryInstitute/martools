# LiteLLM proxy → Ollama. Pull a model first: docker compose exec ollama ollama pull llama3.2
# https://docs.litellm.ai/docs/proxy/configs

model_list:
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

litellm_settings:
  drop_params: true
